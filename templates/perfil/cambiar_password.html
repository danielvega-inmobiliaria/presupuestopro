{% extends 'base.html' %}
{% block title %}Cambiar contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">

    <h4 class="mb-1"><i class="bi bi-key me-2"></i>Cambiar contraseña</h4>
    <p class="text-muted small mb-4">Para la cuenta <strong>{{ user.email }}</strong></p>

    <div class="card shadow-sm">
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Contraseña actual</label>
            <input type="password" class="form-control" name="actual" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña nueva</label>
            <input type="password" class="form-control" name="password" required minlength="6">
          </div>
          <div class="mb-3">
            <label class="form-label">Repetir contraseña nueva</label>
            <input type="password" class="form-control" name="password2" required minlength="6">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-floppy me-1"></i> Guardar
            </button>
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
