<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PresupuestoPRO — Ingresar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #0d1e3c; min-height: 100vh; display: flex; align-items: center; }
    .login-card { max-width: 420px; width: 100%; margin: auto; }
    .brand { color: #eab308; font-size: 1.8rem; font-weight: 700; letter-spacing: -.5px; }
    .brand small { color: #94a3b8; font-size: .85rem; font-weight: 400; display: block; }
  </style>
</head>
<body>
<div class="container">
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand">
        <i class="bi bi-calculator-fill"></i> PresupuestoPRO
        <small>Presupuestos de construcción</small>
      </div>
    </div>
    <div class="card shadow-lg">
      <div class="card-body p-4">
        <h5 class="card-title mb-4">Iniciar sesión</h5>

        {% with msgs = get_flashed_messages(with_categories=True) %}
          {% for cat, msg in msgs %}
            <div class="alert alert-{{ 'danger' if cat == 'error' else 'success' }}">{{ msg }}</div>
          {% endfor %}
        {% endwith %}

        <form method="post">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-warning fw-bold">Ingresar</button>
          </div>
          <div class="text-center mt-3">
            <a href="{{ url_for('auth.recuperar') }}" class="text-secondary small">
              ¿Olvidaste tu contraseña?
            </a>
          </div>
        </form>
      </div>
    </div>
    <p class="text-center text-secondary small mt-3">
      PresupuestoPRO &copy; 2024 — Para constructores de LATAM
    </p>
  </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</body>
</html>
